<div id="comment-modal" class="fixed inset-0 z-[2500] hidden flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-md modal-overlay" id="close-comment-modal-overlay"></div>
    <div class="relative z-10 ultra-card modal-v4 full-screen w-full h-full max-w-none p-0 flex flex-col lg:flex-row overflow-hidden bg-white border-0 shadow-none">
        
        <!-- Decoration Left -->
        <div class="lg:w-2/5 w-full h-[30vh] lg:h-full bg-slate-900 flex flex-col items-center justify-center p-12 relative overflow-hidden text-white text-center">
            <div class="absolute inset-0 bg-primary/20 backdrop-blur-3xl"></div>
            <div class="relative z-10 space-y-6">
                <div class="size-24 md:size-32 rounded-[2.5rem] bg-white/10 backdrop-blur-md border border-white/20 flex items-center justify-center mx-auto shadow-2xl">
                    <span class="material-symbols-outlined text-5xl md:text-7xl">chat</span>
                </div>
                <h2 class="text-4xl md:text-6xl font-black tracking-tighter italic uppercase text-white">마음 나누기</h2>
                <p class="text-slate-300 text-sm md:text-lg font-medium opacity-80">따뜻한 말 한마디가 친구에게 큰 힘이 됩니다.</p>
            </div>
            <button id="close-comment-modal" class="absolute top-6 left-6 size-12 rounded-2xl bg-white/10 backdrop-blur-md hover:bg-white/20 transition-all flex items-center justify-center border border-white/20 z-[100] text-white">
                <span class="material-symbols-outlined text-3xl">arrow_back</span>
            </button>
        </div>

        <!-- Content Right -->
        <div class="lg:w-3/5 w-full h-full flex flex-col bg-white overflow-y-auto p-8 md:p-24 justify-center">
            <div class="max-w-md mx-auto w-full space-y-12">
                <div class="space-y-4">
                    <label class="text-sm font-black text-primary uppercase tracking-[0.3em] ml-1">게시글 제목</label>
                    <h3 id="comment-target-title" class="text-2xl font-black text-text-main">...</h3>
                </div>
                
                <div class="space-y-4">
                    <label class="text-sm font-black text-primary uppercase tracking-[0.3em] ml-1">나의 한마디</label>
                    <textarea id="comment-text" rows="5" class="w-full bg-slate-50 border border-slate-200 rounded-[2rem] px-8 py-8 text-xl font-bold text-text-main placeholder:text-slate-200 focus:outline-none focus:border-primary/40 focus:bg-white transition-all resize-none" placeholder="공감과 응원의 메시지를 남겨주세요..."></textarea>
                </div>

                <button id="submit-comment-btn" class="w-full py-8 rounded-[2.5rem] bg-primary text-white text-2xl font-black uppercase tracking-[0.3em] shadow-2xl shadow-primary/30 hover:scale-[1.02] transition-all">댓글 등록하기</button>
            </div>
        </div>
    </div>
</div>
