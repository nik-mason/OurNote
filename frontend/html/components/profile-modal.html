<div id="profile-modal" class="fixed inset-0 z-[11000] hidden overflow-hidden">
    <div id="close-profile-overlay" class="absolute inset-0 bg-white/20 backdrop-blur-md transition-opacity duration-500 opacity-0 modal-overlay"></div>
    
    <div class="modal-v4 bg-white flex flex-col">
        <!-- Header -->
        <div class="px-8 pt-8 pb-4 flex justify-between items-center shrink-0 border-b border-slate-100">
            <h2 class="text-3xl font-black tracking-tighter italic uppercase text-text-main">내 프로필</h2>
            <button id="close-profile-modal" class="size-11 rounded-full bg-slate-100 hover:bg-primary hover:text-white flex items-center justify-center transition-all">
                <span class="material-symbols-outlined text-[24px]">close</span>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-8">
            <div class="max-w-md mx-auto flex flex-col items-center py-10 space-y-10">
                
                <!-- Avatar Preview & Edit -->
                <div class="relative group">
                    <div id="modal-user-avatar" class="size-48 rounded-[3rem] bg-slate-100 border-4 border-white shadow-2xl bg-center bg-cover transition-transform group-hover:scale-105" style="background-image: url('');"></div>
                    <button id="random-avatar-btn" class="absolute -bottom-4 -right-4 size-14 rounded-2xl bg-primary text-white shadow-xl shadow-primary/30 flex items-center justify-center hover:scale-110 active:scale-95 transition-all">
                        <span class="material-symbols-outlined text-3xl">cached</span>
                    </button>
                </div>

                <div class="text-center space-y-2">
                    <h3 id="modal-user-name" class="text-3xl font-black text-text-main tracking-tighter">사용자 이름</h3>
                    <p id="modal-user-role" class="text-sm font-bold text-primary uppercase tracking-[0.2em]">Student</p>
                </div>

                <!-- Menu Buttons -->
                <div class="w-full space-y-4">
                    <button onclick="window.openSettings(); document.getElementById('close-profile-modal').click();" class="w-full p-6 rounded-[2rem] bg-slate-50 border border-slate-100 flex items-center gap-4 hover:border-primary/50 hover:bg-primary/5 transition-all group">
                        <div class="size-12 rounded-2xl bg-white border border-slate-100 flex items-center justify-center text-slate-400 group-hover:text-primary transition-colors">
                            <span class="material-symbols-outlined">settings</span>
                        </div>
                        <div class="text-left">
                            <p class="font-black text-text-main">환경 설정</p>
                            <p class="text-xs text-text-dim font-bold">테마, 글꼴, 보안 설정 등</p>
                        </div>
                        <span class="material-symbols-outlined ml-auto text-slate-300">chevron_right</span>
                    </button>

                    <button id="profile-logout-btn" class="w-full p-6 rounded-[2rem] bg-red-50/50 border border-red-100 flex items-center gap-4 hover:bg-red-500 hover:text-white transition-all group">
                        <div class="size-12 rounded-2xl bg-white border border-red-100 flex items-center justify-center text-red-500 transition-colors">
                            <span class="material-symbols-outlined">logout</span>
                        </div>
                        <div class="text-left">
                            <p class="font-black">로그아웃</p>
                            <p class="text-xs opacity-60 font-bold uppercase tracking-widest">Sign Out</p>
                        </div>
                    </button>
                </div>

                <div class="pt-10 w-full">
                    <div class="p-6 bg-slate-50 rounded-2xl border border-slate-100">
                        <p class="text-[10px] text-text-dim font-black uppercase tracking-widest mb-2 text-center">My Avatar Seed</p>
                        <input type="text" id="avatar-seed-input" class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-center font-mono text-xs font-bold focus:border-primary outline-none transition-all" placeholder="Enter seed...">
                        <button id="save-avatar-btn" class="w-full mt-3 py-3 rounded-xl bg-slate-800 text-white font-black text-xs uppercase tracking-widest hover:bg-black transition-all">Save Avatar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
