<!-- Password Entry Modal (PIN) -->
<div id="pin-modal" class="hidden fixed inset-0 z-[20000] flex items-center justify-center p-4">
    <!-- Sophisticated Backdrop -->
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-xl modal-overlay" id="close-pin-overlay"></div>
    
    <!-- Centered Premium Card -->
    <div class="relative z-10 w-full max-w-lg bg-white dark:bg-slate-800 rounded-[3rem] shadow-[0_32px_64px_-15px_rgba(0,0,0,0.3)] overflow-hidden flex flex-col transition-all duration-500 transform scale-95 opacity-0 active:scale-100 active:opacity-100 modal-v4">
        
        <!-- Top Visual Accent -->
        <div class="h-1.5 w-full bg-gradient-to-r from-primary via-blue-400 to-indigo-500"></div>

        <div class="p-8 sm:p-12">
            <!-- Header Section -->
            <div class="flex flex-col items-center text-center mb-10">
                <div class="size-20 rounded-3xl bg-primary/10 flex items-center justify-center mb-6 border border-primary/20 shadow-inner">
                    <span class="material-symbols-outlined text-4xl text-primary animate-pulse">lock</span>
                </div>
                <h2 class="text-3xl font-black text-text-main dark:text-white tracking-tighter mb-2 italic">SECURITY PIN</h2>
                <p class="text-text-secondary dark:text-slate-400 font-bold text-sm uppercase tracking-widest opacity-70" id="pin-target-name">본인 확인을 위해 암호를 입력하세요</p>
            </div>

            <!-- PIN Display (Dots) -->
            <div class="flex justify-center gap-4 mb-12">
                <div class="pin-dot size-4 rounded-full border-2 border-slate-200 dark:border-slate-700 transition-all duration-300 shadow-sm"></div>
                <div class="pin-dot size-4 rounded-full border-2 border-slate-200 dark:border-slate-700 transition-all duration-300 shadow-sm"></div>
                <div class="pin-dot size-4 rounded-full border-2 border-slate-200 dark:border-slate-700 transition-all duration-300 shadow-sm"></div>
                <div class="pin-dot size-4 rounded-full border-2 border-slate-200 dark:border-slate-700 transition-all duration-300 shadow-sm"></div>
                <div class="pin-dot size-4 rounded-full border-2 border-slate-200 dark:border-slate-700 transition-all duration-300 shadow-sm"></div>
                <div class="pin-dot size-4 rounded-full border-2 border-slate-200 dark:border-slate-700 transition-all duration-300 shadow-sm"></div>
            </div>

            <!-- Hidden input for PC keyboard accessibility -->
            <input type="password" id="pin-input-real" maxlength="6" class="sr-only" autofocus>

            <!-- Numeric Keypad (Ultra-Modern) -->
            <div class="grid grid-cols-3 gap-3">
                <button class="keypad-btn py-5 rounded-2xl bg-slate-50 dark:bg-slate-700/30 text-2xl font-black text-text-main dark:text-white hover:bg-primary hover:text-white transition-all active:scale-95 flex items-center justify-center" data-val="1">1</button>
                <button class="keypad-btn py-5 rounded-2xl bg-slate-50 dark:bg-slate-700/30 text-2xl font-black text-text-main dark:text-white hover:bg-primary hover:text-white transition-all active:scale-95 flex items-center justify-center" data-val="2">2</button>
                <button class="keypad-btn py-5 rounded-2xl bg-slate-50 dark:bg-slate-700/30 text-2xl font-black text-text-main dark:text-white hover:bg-primary hover:text-white transition-all active:scale-95 flex items-center justify-center" data-val="3">3</button>
                <button class="keypad-btn py-5 rounded-2xl bg-slate-50 dark:bg-slate-700/30 text-2xl font-black text-text-main dark:text-white hover:bg-primary hover:text-white transition-all active:scale-95 flex items-center justify-center" data-val="4">4</button>
                <button class="keypad-btn py-5 rounded-2xl bg-slate-50 dark:bg-slate-700/30 text-2xl font-black text-text-main dark:text-white hover:bg-primary hover:text-white transition-all active:scale-95 flex items-center justify-center" data-val="5">5</button>
                <button class="keypad-btn py-5 rounded-2xl bg-slate-50 dark:bg-slate-700/30 text-2xl font-black text-text-main dark:text-white hover:bg-primary hover:text-white transition-all active:scale-95 flex items-center justify-center" data-val="6">6</button>
                <button class="keypad-btn py-5 rounded-2xl bg-slate-50 dark:bg-slate-700/30 text-2xl font-black text-text-main dark:text-white hover:bg-primary hover:text-white transition-all active:scale-95 flex items-center justify-center" data-val="7">7</button>
                <button class="keypad-btn py-5 rounded-2xl bg-slate-50 dark:bg-slate-700/30 text-2xl font-black text-text-main dark:text-white hover:bg-primary hover:text-white transition-all active:scale-95 flex items-center justify-center" data-val="8">8</button>
                <button class="keypad-btn py-5 rounded-2xl bg-slate-50 dark:bg-slate-700/30 text-2xl font-black text-text-main dark:text-white hover:bg-primary hover:text-white transition-all active:scale-95 flex items-center justify-center" data-val="9">9</button>
                <button class="py-5 rounded-2xl text-xs font-black text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 transition-all active:scale-95 flex items-center justify-center tracking-tighter" id="pin-clear">CLEAR</button>
                <button class="keypad-btn py-5 rounded-2xl bg-slate-50 dark:bg-slate-700/30 text-2xl font-black text-text-main dark:text-white hover:bg-primary hover:text-white transition-all active:scale-95 flex items-center justify-center" data-val="0">0</button>
                <button class="py-5 rounded-2xl text-text-secondary hover:text-primary transition-all active:scale-95 flex items-center justify-center" id="pin-delete">
                    <span class="material-symbols-outlined text-2xl">backspace</span>
                </button>
            </div>
        </div>

        <!-- Action Bar -->
        <div class="px-8 pb-10 sm:px-12">
            <button id="close-pin-modal" class="w-full py-5 rounded-[1.5rem] bg-slate-100 dark:bg-slate-700/50 text-text-secondary dark:text-slate-300 font-bold hover:bg-slate-200 dark:hover:bg-slate-700 transition-all flex items-center justify-center gap-3">
                <span class="material-symbols-outlined">arrow_back</span>
                취소 및 뒤로가기
            </button>
        </div>
    </div>
</div>
