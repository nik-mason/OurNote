<div id="post-detail-modal" class="fixed inset-0 z-[1500] hidden flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-xl modal-overlay" id="close-post-detail-overlay"></div>
    <div class="relative z-10 ultra-card modal-v4 w-full max-w-4xl p-0 flex flex-col overflow-hidden bg-white border border-slate-200 shadow-2xl">
        
        <!-- Modal Header -->
        <div class="px-6 md:px-8 pt-8 pb-6 flex items-center justify-between border-b border-slate-100 bg-white/80 backdrop-blur-md sticky top-0 z-20">
            <div class="flex items-center gap-3 md:gap-4 overflow-hidden">
                <div class="size-10 md:size-12 rounded-2xl bg-primary/20 flex-shrink-0 flex items-center justify-center text-primary shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined text-2xl md:text-3xl">menu_book</span>
                </div>
                <div class="overflow-hidden">
                    <h3 id="detail-title" class="text-xl md:text-3xl font-black tracking-tighter uppercase italic text-text-main leading-none truncate">제목</h3>
                    <p id="detail-meta" class="text-[8px] md:text-[10px] text-text-secondary uppercase tracking-widest mt-1 md:mt-2 opacity-60">카테고리 | 날짜</p>
                </div>
            </div>
            <button id="close-post-detail-modal" class="size-10 md:size-12 rounded-2xl flex-shrink-0 hover:bg-slate-100 transition-all flex items-center justify-center border border-slate-200 group text-text-main ml-4">
                <span class="material-symbols-outlined group-hover:rotate-90 transition-transform text-2xl md:text-3xl">close</span>
            </button>
        </div>

        <!-- Scrollable Content Section -->
        <div class="flex-1 overflow-y-auto px-6 md:px-8 py-8 md:py-10 space-y-8 md:space-y-10 custom-scrollbar bg-white">
            
            <!-- Author Info -->
            <div class="flex items-center gap-4 p-4 md:p-6 bg-slate-50 rounded-2xl md:rounded-[2rem] border border-slate-100">
                <div id="detail-author-avatar" class="size-10 md:size-12 rounded-xl md:rounded-2xl bg-primary text-white flex items-center justify-center font-black text-lg md:text-xl">U</div>
                <div class="overflow-hidden">
                    <p id="detail-author-name" class="font-black text-text-main text-base md:text-lg truncate">사용자 이름</p>
                    <p class="text-[8px] md:text-[10px] text-text-secondary uppercase tracking-widest">Post Author</p>
                </div>
            </div>

            <!-- Main Image -->
            <div id="detail-image-container" class="hidden">
                 <img id="detail-image" src="" class="w-full h-auto max-h-[60vh] md:max-h-[70vh] object-contain rounded-2xl md:rounded-[2.5rem] shadow-2xl border border-slate-100">
            </div>

            <!-- Content -->
            <div class="relative">
                <div class="absolute -left-3 md:-left-4 top-0 w-1 h-full bg-primary/20 rounded-full"></div>
                <p id="detail-content" class="text-lg md:text-2xl text-slate-700 leading-relaxed font-medium whitespace-pre-wrap pl-3 md:pl-4">내용이 여기에 표시됩니다.</p>
            </div>

            <!-- Comments Section -->
            <div class="pt-8 md:pt-10 border-t border-slate-100 space-y-6 md:space-y-8">
                <h4 class="text-[10px] md:text-sm font-black text-text-main uppercase tracking-[0.3em] flex items-center gap-3">
                    <span class="material-symbols-outlined text-primary text-xl md:text-2xl">chat_bubble</span>
                    댓글 리스트 (<span id="detail-comment-count">0</span>)
                </h4>
                
                <div id="detail-comments-list" class="space-y-4">
                    <!-- Comments injected here -->
                </div>

                <div class="flex gap-2 md:gap-4 items-center bg-slate-50 p-4 md:p-6 rounded-2xl md:rounded-[2rem] border border-slate-200 sticky bottom-4">
                    <input type="text" id="detail-comment-input" placeholder="댓글 남기기..." 
                           class="flex-1 bg-white border border-slate-200 rounded-xl md:rounded-2xl px-4 md:px-6 py-3 md:py-4 text-sm md:text-lg font-bold text-text-main placeholder:text-slate-300 focus:outline-none focus:border-primary/40 focus:ring-4 focus:ring-primary/5 transition-all">
                    <button id="detail-submit-comment" class="size-12 md:size-16 rounded-xl md:rounded-2xl bg-primary text-white flex-shrink-0 flex items-center justify-center shadow-xl shadow-primary/30 hover:shadow-primary/50 transition-all hover:scale-105 active:scale-95">
                        <span class="material-symbols-outlined text-2xl md:text-3xl">send</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
