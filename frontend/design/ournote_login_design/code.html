<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OurNote 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4F46E5",
                        "secondary": "#F43F5E",
                        "accent": "#F59E0B",
                        "background-light": "#EFF6FF",
                        "background-dark": "#0F172A",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style type="text/tailwindcss">#teacher-fields { display: none; }
        #student-fields { display: block; }
        input[value="teacher"]:checked ~ #form-content #teacher-fields { display: block; }
        input[value="teacher"]:checked ~ #form-content #student-fields { display: none; }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-center p-4">
<div class="w-full max-w-md bg-white dark:bg-[#1E293B] rounded-xl shadow-2xl border-4 border-white dark:border-slate-800 overflow-hidden relative">
<div class="h-2 bg-gradient-to-r from-primary via-secondary to-accent"></div>
<div class="px-6 pt-10 pb-6 flex flex-col items-center text-center">
<div class="flex items-center gap-3 mb-3">
<div class="size-14 bg-primary/10 rounded-2xl flex items-center justify-center text-primary shadow-inner">
<span class="material-symbols-outlined text-4xl">edit_square</span>
</div>
<h1 class="text-3xl font-black text-slate-900 dark:text-slate-100 tracking-tight">OurNote</h1>
</div>
<p class="text-slate-500 dark:text-slate-400 text-base font-medium">우리 반의 즐거운 기록장</p>
</div>
<div class="flex flex-col">
<div class="px-8 pb-8">
<div class="flex p-1.5 bg-slate-100 dark:bg-slate-800 rounded-2xl relative">
<label class="flex-1 relative cursor-pointer z-10">
<input checked="" class="peer sr-only" id="radio-student" name="login_mode" type="radio" value="student"/>
<div class="py-3 px-4 text-center text-base font-bold rounded-xl transition-all duration-300 text-slate-500 peer-checked:bg-white peer-checked:text-primary peer-checked:shadow-lg dark:text-slate-400 dark:peer-checked:bg-slate-700 dark:peer-checked:text-white">
                        학생 로그인
                    </div>
</label>
<label class="flex-1 relative cursor-pointer z-10">
<input class="peer sr-only" id="radio-teacher" name="login_mode" type="radio" value="teacher"/>
<div class="py-3 px-4 text-center text-base font-bold rounded-xl transition-all duration-300 text-slate-500 peer-checked:bg-white peer-checked:text-primary peer-checked:shadow-lg dark:text-slate-400 dark:peer-checked:bg-slate-700 dark:peer-checked:text-white">
                        선생님 로그인
                    </div>
</label>
</div>
</div>
<div class="px-8 pb-10" id="form-content">
<div class="text-center mb-8">
<h2 class="text-slate-800 dark:text-slate-100 text-2xl font-bold">반가워요! 👋</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-2">정보를 입력하고 로그인을 해주세요.</p>
</div>
<div class="space-y-5" id="student-fields">
<label class="block group">
<span class="text-slate-700 dark:text-slate-300 text-sm font-bold mb-2 block ml-1">출석 번호 (2자리)</span>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-primary material-symbols-outlined text-[24px]">pin</span>
<input class="w-full bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl py-4 pl-12 pr-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-300 focus:outline-none focus:ring-4 focus:ring-primary/20 focus:border-primary transition-all text-lg font-bold" maxlength="2" placeholder="01" type="text"/>
</div>
</label>
<label class="block group">
<span class="text-slate-700 dark:text-slate-300 text-sm font-bold mb-2 block ml-1">전체 이름</span>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-secondary material-symbols-outlined text-[24px]">face</span>
<input class="w-full bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl py-4 pl-12 pr-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-300 focus:outline-none focus:ring-4 focus:ring-secondary/20 focus:border-secondary transition-all text-lg font-bold" placeholder="홍길동" type="text"/>
</div>
</label>
</div>
<div class="space-y-5" id="teacher-fields">
<label class="block">
<span class="text-slate-700 dark:text-slate-300 text-sm font-bold mb-2 block ml-1">아이디 (ID)</span>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-accent material-symbols-outlined text-[24px]">account_circle</span>
<input class="w-full bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl py-4 pl-12 pr-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-300 focus:outline-none focus:ring-4 focus:ring-accent/20 focus:border-accent transition-all text-lg font-bold" placeholder="teacher_id" type="text"/>
</div>
</label>
<label class="block">
<span class="text-slate-700 dark:text-slate-300 text-sm font-bold mb-2 block ml-1">비밀번호</span>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 material-symbols-outlined text-[24px]">lock</span>
<input class="w-full bg-slate-50 dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 rounded-2xl py-4 pl-12 pr-4 text-slate-900 dark:text-slate-100 placeholder:text-slate-300 focus:outline-none focus:ring-4 focus:ring-slate-200 focus:border-slate-400 transition-all text-lg font-bold" placeholder="••••••••" type="password"/>
</div>
</label>
</div>
<div class="mt-8 flex flex-col gap-4">
<button class="w-full bg-primary hover:bg-indigo-700 text-white font-black py-4 px-4 rounded-2xl shadow-xl shadow-primary/30 active:scale-[0.97] transition-all flex items-center justify-center gap-3 text-lg">
<span>로그인 하기</span>
<span class="material-symbols-outlined text-2xl">arrow_forward_ios</span>
</button>
<button class="text-slate-400 hover:text-primary text-sm font-bold transition-colors">계정 정보를 잊으셨나요?</button>
</div>
</div>
</div>
<div class="bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-700 px-6 py-5 text-center">
<p class="text-slate-500 dark:text-slate-400 text-xs font-medium">
            로그인이 안 되나요? <a class="text-primary dark:text-primary/80 font-bold hover:underline" href="#">선생님께 문의하기</a>
</p>
</div>
</div>
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none opacity-50">
<div class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] bg-secondary/10 rounded-full blur-[120px]"></div>
<div class="absolute top-[40%] right-[10%] w-[30%] h-[30%] bg-accent/10 rounded-full blur-[100px]"></div>
</div>
<script>
    // Logic for static HTML toggle behavior
    const studentRadio = document.getElementById('radio-student');
    const teacherRadio = document.getElementById('radio-teacher');
    const studentFields = document.getElementById('student-fields');
    const teacherFields = document.getElementById('teacher-fields');
    studentRadio.addEventListener('change', () => {
        if(studentRadio.checked) {
            studentFields.style.display = 'block';
            teacherFields.style.display = 'none';
        }
    });
    teacherRadio.addEventListener('change', () => {
        if(teacherRadio.checked) {
            studentFields.style.display = 'none';
            teacherFields.style.display = 'block';
        }
    });
</script>

</body></html>
