<div id="write-modal" class="fixed inset-0 z-[1500] hidden flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-md modal-overlay" id="close-write-modal-overlay"></div>
    <div class="relative z-10 ultra-card modal-v4 w-full max-w-2xl p-0 flex flex-col overflow-hidden bg-white border border-slate-200 shadow-2xl">
        
        <!-- Modal Header -->
        <div class="px-8 pt-8 pb-6 flex items-center justify-between border-b border-slate-100">
            <div class="flex items-center gap-4">
                <div class="size-12 rounded-2xl bg-primary/20 flex items-center justify-center text-primary shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined text-3xl">edit_note</span>
                </div>
                <div>
                    <h3 class="text-2xl font-black tracking-tighter uppercase italic text-text-main leading-none">새 이야기 작성</h3>
                    <p class="text-[10px] text-text-secondary uppercase tracking-widest mt-1 opacity-60">Share your thoughts with OurNote</p>
                </div>
            </div>
            <button id="close-write-modal" class="size-10 rounded-xl hover:bg-slate-100 transition-all flex items-center justify-center border border-slate-200 group text-text-main">
                <span class="material-symbols-outlined group-hover:rotate-90 transition-transform">close</span>
            </button>
        </div>

        <!-- Scrollable Content Section -->
        <div class="flex-1 overflow-y-auto px-8 py-8 space-y-8 custom-scrollbar bg-white">

            <!-- Category Selection -->
            <div class="space-y-4">
                <label class="text-[10px] font-black text-primary uppercase tracking-[0.2em] ml-1">게시판 선택</label>
                <div id="category-chips" class="flex flex-wrap gap-2">
                    <button type="button" class="post-cat-chip active p-4 rounded-2xl bg-primary text-white font-bold transition-all" data-value="dashboard">✨ 대시보드</button>
                    <!-- Rest of chips will be added by JS to handle roles -->
                    <button type="button" class="post-cat-chip p-4 rounded-2xl bg-slate-100 text-slate-500 font-bold transition-all" data-value="notice">📢 공지사항</button>
                    <button type="button" class="post-cat-chip p-4 rounded-2xl bg-slate-100 text-slate-500 font-bold transition-all" data-value="event">🎉 이벤트</button>
                    <button type="button" class="post-cat-chip p-4 rounded-2xl bg-slate-100 text-slate-500 font-bold transition-all" data-value="homework">📝 숙제</button>
                </div>
                <input type="hidden" id="post-category" value="dashboard">
            </div>

            <!-- Homework Specific: Student Target -->
            <div id="homework-target-container" class="hidden space-y-4">
                <label class="text-[10px] font-black text-primary uppercase tracking-[0.2em] ml-1">수신 학생 선택</label>
                <div id="student-chips" class="flex flex-wrap gap-2 max-h-48 overflow-y-auto p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <button type="button" class="stu-chip active px-4 py-2 rounded-xl bg-primary text-white font-bold text-xs" data-value="all">🌍 전체 공개</button>
                    <!-- Injected by JS -->
                </div>
                <input type="hidden" id="homework-target-student-val" value="all">
            </div>

            <!-- Title & Content -->
            <div class="space-y-6">
                <div class="relative group">
                    <label class="text-[10px] font-black text-primary uppercase tracking-[0.2em] ml-1 mb-2 block">제목</label>
                    <input type="text" id="post-title"
                        class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-5 text-xl font-bold text-text-main placeholder:text-slate-300 focus:border-primary/40 focus:bg-white outline-none transition-all"
                        placeholder="제목을 입력하세요">
                </div>

                <div class="relative group">
                    <label class="text-[10px] font-black text-primary uppercase tracking-[0.2em] ml-1 mb-2 block">내용</label>
                    <textarea id="post-content" rows="6"
                        class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-5 text-lg text-text-main placeholder:text-slate-300 focus:border-primary/40 focus:bg-white outline-none transition-all resize-none"
                        placeholder="우리만의 이야기를 들려주세요..."></textarea>
                </div>
            </div>

            <!-- Image Upload -->
            <div class="space-y-3">
                <label class="text-[10px] font-black text-primary uppercase tracking-[0.2em] ml-1">이미지 업로드</label>
                <div class="relative group">
                    <div class="w-full bg-slate-50 border border-dashed border-slate-300 rounded-2xl p-6 flex flex-col items-center justify-center gap-3 hover:border-primary/40 hover:bg-white transition-all cursor-pointer relative overflow-hidden">
                        <span class="material-symbols-outlined text-4xl text-primary/40 group-hover:text-primary transition-colors">add_photo_alternate</span>
                        <span class="text-xs font-bold text-text-secondary group-hover:text-text-main transition-colors">이미지 선택 또는 드래그</span>
                        <input type="file" id="post-image" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                    </div>
                    <img id="image-preview" src="" class="hidden mt-6 w-full max-h-[400px] object-cover rounded-2xl border border-slate-200 shadow-xl">
                </div>
            </div>

            <!-- Homework Tasks -->
            <div id="homework-tasks-container" class="hidden space-y-4 p-8 bg-primary/5 rounded-[2rem] border border-primary/20">
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="font-bold text-primary flex items-center gap-2">
                            <span class="material-symbols-outlined">checklist</span>
                            필수 항목 리스트
                        </h4>
                        <button id="add-task-btn" class="size-10 rounded-full bg-primary/20 hover:bg-primary text-primary hover:text-white transition-all">
                            <span class="material-symbols-outlined">add</span>
                        </button>
                    </div>
                    <div id="tasks-input-list" class="space-y-3">
                    </div>
                </div>

            <!-- Footer Actions -->
            <div class="pt-6 space-y-6">
                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-200" id="anonymous-toggle-container">
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-text-secondary">visibility_off</span>
                        <span class="text-sm font-bold text-text-secondary">익명으로 게시 (선생님만 확인 가능)</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="post-anonymous" class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-slate-400 peer-checked:after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                    </label>
                </div>

                <button id="submit-post"
                    class="w-full py-6 rounded-3xl bg-primary text-white text-xl font-black uppercase tracking-[0.2em] shadow-2xl shadow-primary/40 hover:shadow-primary/60 hover:scale-[1.02] active:scale-[0.98] transition-all">
                    게시물 등록하기
                </button>
            </div>
        </div>
    </div>
</div>
