<!-- AI Face Scan Security Layer -->
<div id="face-scan-overlay" class="fixed inset-0 z-[1600] bg-white hidden flex flex-col items-center justify-center font-mono overflow-hidden">
    <!-- HUD Elements -->
    <div class="absolute top-10 left-10 text-primary/50 text-[10px] space-y-1">
        <div>CORE_SYSTEM: STABLE</div>
        <div>ENCRYPTION: 256-BIT-AES</div>
    </div>
    
    <div class="absolute top-10 right-10 text-text-secondary text-[10px] cursor-help" id="bypass-trigger">
        <div class="text-right">LOCAL_TIME: ONLINE</div>
    </div>

    <!-- Scanning Frame -->
    <div class="relative size-80 flex items-center justify-center">
        <div class="absolute inset-0 border-2 border-primary/20 rounded-full animate-pulse"></div>
        <div id="scan-bar" class="absolute w-full h-1 bg-primary/40 top-0 left-0 animate-scan shadow-[0_0_15px_#2b8ce6]"></div>

            <div class="text-xs font-black tracking-widest text-primary uppercase">Identifying Candidate...</div>
        </div>
        
        <!-- Target Corners -->
        <div class="absolute top-0 left-0 size-10 border-t-4 border-l-4 border-primary"></div>
        <div class="absolute top-0 right-0 size-10 border-t-4 border-r-4 border-primary"></div>
        <div class="absolute bottom-0 left-0 size-10 border-b-4 border-l-4 border-primary"></div>
        <div class="absolute bottom-0 right-0 size-10 border-b-4 border-r-4 border-primary"></div>
    </div>

    <div class="mt-16 text-center space-y-4">
        <div id="scan-status" class="text-2xl font-black italic tracking-tighter text-text-main animate-pulse">NEURAL_LINK_SYNCHRONIZING...</div>
    </div>
</div>
