<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OurNote - 로그인</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
    <link rel="icon" type="image/png" href="/backend/assets/logo.png">
    <link rel="manifest" href="/frontend/manifest.json">
    <!-- Legacy Fonts Removed -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b8cee",
                        "primary-dark": "#1a6bbd",
                        "accent": "#f43f5e",
                        "background-light": "#f8fafc",
                        "surface-light": "#ffffff",
                        "text-main": "#0f172a",
                    },
                    fontFamily: {
                        "sans": ["Cafe24SsurroundAir", "sans-serif"],
                        "display": ["Cafe24SsurroundAir", "sans-serif"],
                        "body": ["Cafe24SsurroundAir", "sans-serif"],
                    },
                },
            },
        }
    </script>
    <style>
        .neon-blob {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -10;
            opacity: 0.15;
            pointer-events: none;
            animation: moveSlowly 25s infinite alternate ease-in-out;
        }

        @keyframes moveSlowly {
            0% {
                transform: translate(-10%, -10%) scale(1);
            }

            100% {
                transform: translate(20%, 20%) scale(1.2);
            }
        }
    </style>
    <script>
        // Immediate Theme Check
        (function() {
            const savedTheme = localStorage.getItem('ournote_theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark-mode');
                document.body.classList.add('dark-mode');
            }
        })();
    </script>
</head>

<body class="overflow-x-hidden font-body bg-background-light dark:bg-slate-900 transition-colors duration-300">
    <canvas id="particle-canvas"></canvas>
    <div id="cursor-v4"></div>

    <!-- Ultra Background Blobs -->
    <div class="neon-blob bg-primary/20 top-[-10%] left-[-10%]"></div>
    <div class="neon-blob bg-accent/10 bottom-[10%] right-[-5%]" style="animation-delay: -5s"></div>
    <div class="neon-blob bg-purple-500/10 top-[20%] right-[15%]" style="animation-delay: -10s"></div>

    <div id="splash-screen"
        class="fixed inset-0 z-[10000] bg-white dark:bg-slate-900 flex flex-col items-center justify-center transition-all duration-1000">
        <!-- Flying Elements Container -->
        <div id="flying-particles" class="flying-wrap"></div>

        <!-- Animated Rings -->
        <div class="splash-ring" style="animation-delay: 0s; border-color: rgba(43, 140, 238, 0.2);"></div>
        
        <div class="relative z-10 flex flex-col items-center">
            <div class="relative mb-8">
                <div class="logo-container-ultra">
                    <img src="/backend/assets/logo.png" alt="OurNote Logo" class="ournote-logo-img">
                </div>
            </div>

            <h1 class="text-4xl font-black text-primary tracking-tighter mb-2">OURNOTE</h1>
            <h2 class="text-2xl font-bold text-text-main dark:text-white mb-6">천사반</h2>
            
            <p class="text-text-secondary tracking-[10px] text-[10px] font-black uppercase opacity-70">Angel Ed. v4.2 Ultra</p>
        </div>
    </div>

    <div id="ultra-bar" class="ultra-progress bg-primary/20"></div>

    <main class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-800 rounded-[2.5rem] shadow-2xl shadow-slate-200/50 dark:shadow-none max-w-lg w-full p-12 relative border border-slate-100 dark:border-slate-700/50 login-card-v4 active transition-colors duration-300">
            <!-- Decorative light -->
            <div class="absolute -top-12 -right-12 size-48 bg-primary/5 blur-[50px] rounded-full"></div>
            
            <button id="pwa-install-btn" class="hidden absolute top-6 right-6 lg:flex items-center gap-2 px-3 py-1.5 rounded-full bg-primary/10 text-primary hover:bg-primary hover:text-white transition-all text-[10px] font-black uppercase tracking-widest border border-primary/20">
                <span class="material-symbols-outlined text-[16px]">download</span>
                Install
            </button>

            <div class="text-center mb-12">
                <div class="size-20 bg-primary/10 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-primary/20">
                    <span class="material-symbols-outlined text-4xl text-primary">school</span>
                </div>
                <h2 class="text-4xl font-black text-text-main dark:text-white tracking-tighter mb-4">반가워요!</h2>
                <p class="text-text-secondary dark:text-slate-300 text-lg">우리만의 소중한 공간으로 들어오세요.</p>
            </div>

            <div class="flex gap-2 p-1.5 bg-slate-50 dark:bg-slate-700/50 rounded-2xl mb-10 border border-slate-200/50 dark:border-slate-600/50 transition-colors">
                <button id="radio-student-btn"
                    class="flex-1 py-4 rounded-[14px] bg-primary text-white font-bold transition-all shadow-lg shadow-primary/20">학생</button>
                <button id="radio-teacher-btn"
                    class="flex-1 py-4 rounded-[14px] text-text-secondary font-bold hover:text-text-main transition-all">선생님</button>
                <input type="hidden" id="login-mode" value="student">
            </div>

            <div id="student-fields" class="space-y-6">
                <div class="relative">
                    <span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-text-secondary">pin</span>
                    <input type="text" id="student-id"
                        class="w-full bg-slate-50 dark:bg-slate-700/50 border border-slate-200/50 dark:border-slate-600/50 rounded-2xl py-5 pl-14 pr-6 text-text-main dark:text-white outline-none focus:border-primary transition-all placeholder:text-text-secondary dark:placeholder-slate-400"
                        placeholder="출석 번호 (01)">
                </div>
                <div class="relative">
                    <span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-text-secondary">person</span>
                    <input type="text" id="student-name"
                        class="w-full bg-slate-50 dark:bg-slate-700/50 border border-slate-200/50 dark:border-slate-600/50 rounded-2xl py-5 pl-14 pr-6 text-text-main dark:text-white outline-none focus:border-primary transition-all placeholder:text-text-secondary dark:placeholder-slate-400"
                        placeholder="이름">
                </div>
            </div>

            <div id="teacher-fields" class="space-y-6 hidden">
                <div class="relative">
                    <span
                        class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-text-dim">badge</span>
                    <input type="text" id="teacher-id"
                        class="w-full bg-[var(--glass-bg)] border border-[var(--glass-border)] rounded-2xl py-5 pl-14 pr-6 text-[var(--text-white)] outline-none focus:border-primary transition-all placeholder:text-text-dim"
                        placeholder="아이디">
                </div>
                <div class="relative">
                    <span
                        class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-text-dim">key</span>
                    <input type="password" id="teacher-pw"
                        class="w-full bg-[var(--glass-bg)] border border-[var(--glass-border)] rounded-2xl py-5 pl-14 pr-6 text-[var(--text-white)] outline-none focus:border-primary transition-all placeholder:text-text-dim"
                        placeholder="비밀번호">
                </div>
            </div>

            <button id="login-btn"
                class="w-full liquid-btn mt-10 py-6 text-2xl group flex items-center justify-center gap-3">
                입장하기
                <span
                    class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
            </button>

            <p class="text-center mt-8 text-text-dim text-sm font-medium">로그인이 안 되나요? <a href="#"
                    class="text-primary hover:underline">선생님께 문의하기</a></p>
            
            <button onclick="window.location.reload()" class="w-full mt-6 py-4 rounded-2xl flex items-center justify-center gap-3 text-text-dim hover:text-white hover:bg-white/5 transition-all text-sm border border-transparent hover:border-white/10 uppercase tracking-widest font-black">
                <span class="material-symbols-outlined text-sm">history</span>
                처음으로
            </button>
        </div>
    </main>

    <!-- (Color Auth Modal Removed) -->

    <!-- (PIN Entry Modal) -->
    <div id="pin-modal" class="hidden fixed inset-0 z-[20000] flex items-center justify-center">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-md modal-overlay" id="close-pin-overlay"></div>
        <div class="relative z-10 ultra-card modal-v4 full-screen w-full h-full max-w-none p-0 flex flex-col lg:flex-row overflow-hidden bg-white dark:bg-slate-800 transition-colors duration-300">
            
            <!-- Visual Section -->
            <div class="lg:w-2/5 w-full h-[30vh] lg:h-full bg-slate-900 flex flex-col items-center justify-center p-12 relative overflow-hidden text-white text-center">
                <div class="absolute inset-0 bg-primary/20 backdrop-blur-3xl"></div>
                <div class="relative z-10 space-y-6">
                    <div class="size-24 md:size-32 rounded-[2.5rem] bg-white/10 backdrop-blur-md border border-white/20 flex items-center justify-center mx-auto shadow-2xl">
                        <span class="material-symbols-outlined text-5xl md:text-7xl animate-pulse">lock</span>
                    </div>
                    <h2 class="text-4xl md:text-6xl font-black tracking-tighter italic uppercase">Security<br>PIN</h2>
                    <p class="text-slate-300 text-sm md:text-lg font-medium opacity-80" id="pin-target-name">박유민님, 비밀번호를 입력하세요</p>
                </div>
                <button id="close-pin-modal" class="absolute top-6 left-6 size-12 rounded-2xl bg-white/10 backdrop-blur-md hover:bg-white/20 transition-all flex items-center justify-center border border-white/20">
                    <span class="material-symbols-outlined text-3xl">arrow_back</span>
                </button>
            </div>

            <!-- Input Section -->
            <div class="lg:w-3/5 w-full h-full flex flex-col bg-white dark:bg-slate-800 overflow-y-auto p-8 md:p-24 justify-center items-center transition-colors duration-300">
                <div class="max-w-md mx-auto w-full space-y-12">
                    <!-- Dots display -->
                    <div class="flex justify-center gap-4 py-8">
                        <div class="pin-dot size-6 rounded-full border-2 border-slate-200 dark:border-slate-600/50 transition-all duration-300"></div>
                        <div class="pin-dot size-6 rounded-full border-2 border-slate-200 dark:border-slate-600/50 transition-all duration-300"></div>
                        <div class="pin-dot size-6 rounded-full border-2 border-slate-200 dark:border-slate-600/50 transition-all duration-300"></div>
                        <div class="pin-dot size-6 rounded-full border-2 border-slate-200 dark:border-slate-600/50 transition-all duration-300"></div>
                        <div class="pin-dot size-6 rounded-full border-2 border-slate-200 dark:border-slate-600/50 transition-all duration-300"></div>
                        <div class="pin-dot size-6 rounded-full border-2 border-slate-200 dark:border-slate-600/50 transition-all duration-300"></div>
                    </div>

                    <!-- Hidden input for PC keyboard -->
                    <input type="password" id="pin-input-real" maxlength="6" class="sr-only" autofocus>

                    <!-- Numeric Keypad (Optimized for Mobile) -->
                    <div class="grid grid-cols-3 gap-4">
                        <button class="keypad-btn py-8 rounded-3xl bg-slate-50 dark:bg-slate-700/50 text-3xl font-black text-text-main dark:text-white hover:bg-primary hover:text-white transition-all shadow-sm flex items-center justify-center" data-val="1">1</button>
                        <button class="keypad-btn py-8 rounded-3xl bg-slate-50 dark:bg-slate-700/50 text-3xl font-black text-text-main dark:text-white hover:bg-primary hover:text-white transition-all shadow-sm flex items-center justify-center" data-val="2">2</button>
                        <button class="keypad-btn py-8 rounded-3xl bg-slate-50 dark:bg-slate-700/50 text-3xl font-black text-text-main dark:text-white hover:bg-primary hover:text-white transition-all shadow-sm flex items-center justify-center" data-val="3">3</button>
                        <button class="keypad-btn py-8 rounded-3xl bg-slate-50 dark:bg-slate-700/50 text-3xl font-black text-text-main dark:text-white hover:bg-primary hover:text-white transition-all shadow-sm flex items-center justify-center" data-val="4">4</button>
                        <button class="keypad-btn py-8 rounded-3xl bg-slate-50 dark:bg-slate-700/50 text-3xl font-black text-text-main dark:text-white hover:bg-primary hover:text-white transition-all shadow-sm flex items-center justify-center" data-val="5">5</button>
                        <button class="keypad-btn py-8 rounded-3xl bg-slate-50 dark:bg-slate-700/50 text-3xl font-black text-text-main dark:text-white hover:bg-primary hover:text-white transition-all shadow-sm flex items-center justify-center" data-val="6">6</button>
                        <button class="keypad-btn py-8 rounded-3xl bg-slate-50 dark:bg-slate-700/50 text-3xl font-black text-text-main dark:text-white hover:bg-primary hover:text-white transition-all shadow-sm flex items-center justify-center" data-val="7">7</button>
                        <button class="keypad-btn py-8 rounded-3xl bg-slate-50 dark:bg-slate-700/50 text-3xl font-black text-text-main dark:text-white hover:bg-primary hover:text-white transition-all shadow-sm flex items-center justify-center" data-val="8">8</button>
                        <button class="keypad-btn py-8 rounded-3xl bg-slate-50 dark:bg-slate-700/50 text-3xl font-black text-text-main dark:text-white hover:bg-primary hover:text-white transition-all shadow-sm flex items-center justify-center" data-val="9">9</button>
                        <button class="py-8 rounded-3xl bg-slate-50 dark:bg-slate-700/50 text-xl font-bold text-text-dim dark:text-slate-400 hover:text-accent transition-all flex items-center justify-center" id="pin-clear">CLEAR</button>
                        <button class="keypad-btn py-8 rounded-3xl bg-slate-50 dark:bg-slate-700/50 text-3xl font-black text-text-main dark:text-white hover:bg-primary hover:text-white transition-all shadow-sm flex items-center justify-center" data-val="0">0</button>
                        <button class="py-8 rounded-3xl bg-slate-50 dark:bg-slate-700/50 text-xl font-bold text-text-dim dark:text-slate-400 hover:text-primary transition-all flex items-center justify-center" id="pin-delete">
                            <span class="material-symbols-outlined">backspace</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-10 right-10 z-[300] flex flex-col gap-4"></div>

    <script type="module" src="/frontend/javascript/main.js"></script>
</body>


</html>
