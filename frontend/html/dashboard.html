<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OurNote v4.3 Premium</title>
    
    <!-- SEO & Performance -->
    <meta name="description" content="우리들의 특별한 노트, OurNote v4.3 Premium Edition">
    <link rel="icon" href="/frontend/assets/logo.png">
    
    <!-- Modern Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="/frontend/css/style.css?v=4.3">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2b8ce6',
                        accent: '#ff3d71',
                        surface: {
                            light: '#ffffff',
                            dark: '#020617'
                        },
                        text: {
                            main: '#1e293b',
                            secondary: '#64748b',
                            dim: '#94a3b8'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface-light dark:bg-surface-dark transition-colors duration-500 overflow-x-hidden">
    <!-- Splash Screen -->
    <div id="splash-screen" class="fixed inset-0 z-[10000] bg-white dark:bg-[#020617] flex items-center justify-center transition-opacity duration-700">
        <div class="flex flex-col items-center gap-6 animate-pulse">
            <div class="size-20 rounded-3xl bg-primary/10 flex items-center justify-center shadow-2xl shadow-primary/20">
                <span class="material-symbols-outlined text-primary text-5xl">school</span>
            </div>
            <div class="flex flex-col items-center">
                <h1 class="text-3xl font-black text-text-main dark:text-white tracking-tighter italic uppercase">OurNote</h1>
                <p class="text-[10px] text-primary font-bold uppercase tracking-[0.3em]">Premium v4.3</p>
            </div>
        </div>
    </div>

    <div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
        <!-- Header -->
        <header class="sticky top-0 z-50 w-full border-b border-slate-200 bg-surface-light/80 backdrop-blur-md">
            <div class="mx-auto flex h-16 max-w-[1200px] items-center justify-between px-4 sm:px-6">
                <div class="flex items-center gap-2 sm:gap-4 flex-1 sm:flex-initial">
                    <div class="flex items-center gap-2 text-primary shrink-0">
                        <div class="flex items-center justify-center size-8 sm:size-9 rounded-xl bg-primary/10">
                            <span class="material-symbols-outlined text-primary text-[20px] sm:text-[24px]">school</span>
                        </div>
                        <h2 class="text-text-main text-lg sm:text-xl font-bold tracking-tight hidden xs:block">OurNote</h2>
                    </div>
                    
                    <button id="header-settings-btn" class="flex items-center justify-center size-9 rounded-xl bg-slate-50 border border-slate-100 text-slate-500 hover:text-primary hover:bg-primary/5 transition-all ml-2" onclick="window.openSettings()">
                        <span class="material-symbols-outlined text-[20px]">settings</span>
                    </button>
                </div>

                <div class="flex items-center gap-3">
                    <!-- Search (Desktop) -->
                    <div class="hidden lg:flex items-center relative">
                        <span class="absolute left-3 text-text-secondary material-symbols-outlined text-[18px]">search</span>
                        <input class="block w-48 xl:w-64 rounded-full border-none bg-slate-100 py-1.5 pl-9 pr-4 text-sm focus:ring-2 focus:ring-primary" placeholder="검색" type="text"/>
                    </div>

                    <button id="open-profile-modal" class="flex items-center gap-3 pl-4 border-l border-slate-100 ml-1 group">
                        <div class="hidden sm:flex flex-col items-end">
                            <span id="display-username" class="text-sm font-bold text-text-main group-hover:text-primary transition-colors">사용자</span>
                            <span class="text-[10px] text-text-dim font-bold uppercase tracking-widest">My Profile</span>
                        </div>
                        <div id="user-avatar" class="size-10 rounded-2xl bg-slate-100 border-2 border-white shadow-sm bg-center bg-cover group-hover:scale-105 transition-transform"></div>
                    </button>
                    
                    <!-- Hamburger Menu Button (Visible on all screens as requested) -->
                    <button id="mobile-hamburger" class="size-11 rounded-xl bg-slate-900 text-white flex items-center justify-center hover:bg-primary transition-all active:scale-95 ml-2">
                        <span class="material-symbols-outlined text-[24px]">menu</span>
                    </button>
                </div>
            </div>
        </header>

        <main class="flex-1">
            <div class="mx-auto max-w-[1200px] px-4 py-8 sm:px-6 lg:px-8">
                <div id="posts-container" class="space-y-6">
                    <!-- Posts will be loaded here -->
                    <div class="flex flex-col items-center justify-center py-20 opacity-20">
                        <span class="material-symbols-outlined text-6xl animate-spin mb-4">sync</span>
                        <p class="font-bold uppercase tracking-widest text-xs">Synchronizing with Cloud...</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Floating Write Button -->
        <button id="open-write-modal" class="fixed bottom-8 right-8 size-16 rounded-[2rem] bg-slate-900 text-white shadow-2xl shadow-slate-900/40 flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-40">
            <span class="material-symbols-outlined text-3xl">add</span>
        </button>
    </div>

    <!-- Modals Container -->
    <div id="modal-container"></div>
    <div id="security-container"></div>
    
    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-10 right-10 z-[20000] flex flex-col gap-4 pointer-events-none"></div>

    <script type="module" src="/frontend/javascript/main.js?v=4.3"></script>
</body>
</html>
