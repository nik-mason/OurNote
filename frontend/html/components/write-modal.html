<div id="write-modal" class="fixed inset-0 z-[1500] hidden flex flex-col items-center justify-center">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-xl modal-overlay" id="close-write-modal-overlay"></div>
    <div class="relative z-10 w-full h-full max-w-none bg-white flex flex-col overflow-hidden">
        
        <div class="px-8 pt-8 pb-4 sticky top-0 bg-white/95 backdrop-blur-md z-20 border-b border-slate-100 flex justify-between items-center shrink-0">
            <div>
                <h2 class="text-3xl font-black tracking-tighter italic uppercase text-text-main">새 이야기 작성</h2>
            </div>
            <button id="close-write-modal" class="size-10 rounded-xl bg-slate-100 hover:bg-slate-200 transition-all flex items-center justify-center text-slate-500">
                <span class="material-symbols-outlined text-[20px]">close</span>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto w-full custom-scrollbar flex flex-col p-8 space-y-8">
            <!-- Category Selection -->
            <div class="space-y-4">
                <label class="text-sm font-black text-primary uppercase tracking-[0.3em] ml-1">게시판 선택</label>
                <div id="category-chips" class="flex flex-wrap gap-3">
                    <button type="button" class="post-cat-chip active px-6 py-3 rounded-2xl bg-primary text-white font-bold transition-all shadow-md shadow-primary/20" data-value="dashboard">✨ 대시보드</button>
                    <!-- Injected by JS -->
                </div>
                <input type="hidden" id="post-category" value="dashboard">
            </div>

            <!-- Homework Specific -->
            <div id="homework-target-container" class="hidden space-y-4">
                <label class="text-sm font-black text-primary uppercase tracking-[0.3em] ml-1">수신 학생 선택</label>
                <div id="student-chips" class="flex flex-wrap gap-2 p-5 bg-slate-50 rounded-2xl border border-slate-100 max-h-40 overflow-y-auto">
                    <button type="button" class="stu-chip active px-4 py-2 rounded-xl bg-primary text-white font-bold text-xs" data-value="all">🌍 전체 공개</button>
                </div>
                <input type="hidden" id="homework-target-student-val" value="all">
            </div>

            <!-- Inputs -->
            <div class="space-y-6">
                <input type="text" id="post-title"
                    class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-6 py-4 text-xl font-black text-text-main placeholder:text-slate-400 focus:border-primary/40 focus:bg-white outline-none transition-all"
                    placeholder="이야기 제목">

                <textarea id="post-content" rows="6"
                    class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-6 py-4 text-base text-text-main placeholder:text-slate-400 focus:border-primary/40 focus:bg-white outline-none transition-all resize-none"
                    placeholder="우리만의 이야기를 들려주세요..."></textarea>
            </div>

            <!-- Image Upload -->
            <div class="space-y-4">
                <div class="relative group">
                    <div class="w-full h-32 bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center gap-2 hover:border-primary/40 hover:bg-white transition-all cursor-pointer relative overflow-hidden">
                        <span class="material-symbols-outlined text-3xl text-primary/40 group-hover:text-primary transition-colors">add_photo_alternate</span>
                        <span class="text-xs font-bold text-slate-500">이미지 첨부</span>
                        <input type="file" id="post-image" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                    </div>
                    <img id="image-preview" src="" class="hidden mt-4 w-full rounded-2xl border border-slate-100 shadow-md">
                </div>
            </div>

            <!-- Homework Tasks -->
            <div id="homework-tasks-container" class="hidden space-y-4 p-6 bg-primary/5 rounded-2xl border border-primary/20">
                <div class="flex justify-between items-center">
                    <h4 class="text-sm font-black text-primary flex items-center gap-2">
                        <span class="material-symbols-outlined text-[18px]">checklist</span> 필수 항목
                    </h4>
                    <button id="add-task-btn" class="size-8 rounded-xl bg-primary/20 hover:bg-primary text-primary hover:text-white transition-all flex justify-center items-center">
                        <span class="material-symbols-outlined text-[16px]">add</span>
                    </button>
                </div>
                <div id="tasks-input-list" class="space-y-3"></div>
            </div>
        </div>

        <!-- Action Footer (Sticky Bottom) -->
        <div class="p-6 bg-slate-50 border-t border-slate-100 z-20 flex items-center justify-between shrink-0">
            <div class="flex items-center gap-3">
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="post-anonymous" class="sr-only peer">
                    <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                </label>
                <span class="text-sm font-bold text-text-secondary">익명</span>
            </div>

            <button id="submit-post"
                class="px-8 py-3 rounded-2xl bg-primary text-white text-sm font-black uppercase tracking-widest shadow-lg shadow-primary/30 hover:shadow-primary/50 hover:bg-primary-dark active:scale-95 transition-all">
                완료
            </button>
        </div>
    </div>
</div>
