<div id="post-detail-modal" class="fixed inset-0 z-[1500] hidden flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-xl modal-overlay" id="close-post-detail-overlay"></div>
    <div class="relative z-10 ultra-card modal-v4 full-screen w-full h-full max-w-none p-0 flex flex-col lg:flex-row overflow-hidden bg-white border-0 shadow-none">
        <!-- Close Button (Absolute positioned on full screen) -->
        <button id="close-post-detail-modal" class="absolute top-6 right-6 size-12 rounded-2xl bg-white/10 backdrop-blur-md hover:bg-white/20 transition-all flex items-center justify-center border border-white/20 z-[100] text-white">
            <span class="material-symbols-outlined text-3xl">close</span>
        </button>

        <!-- GRID LEFT: Image Section -->
        <div id="detail-image-container" class="lg:w-3/5 w-full h-[40vh] lg:h-full bg-slate-900 flex items-center justify-center relative group overflow-hidden">
             <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
             <img id="detail-image" src="" class="w-full h-full object-contain relative z-10 p-4 md:p-10">
        </div>

        <!-- GRID RIGHT: Content Section -->
        <div class="lg:w-2/5 w-full h-full flex flex-col bg-white overflow-y-auto custom-scrollbar">
            
            <!-- Sticky Header -->
            <div class="px-8 pt-10 pb-6 sticky top-0 bg-white/80 backdrop-blur-xl z-20 border-b border-slate-50">
                <div class="flex items-center gap-4 mb-4">
                    <div class="size-12 rounded-2xl bg-primary/20 flex items-center justify-center text-primary">
                        <span class="material-symbols-outlined text-3xl">menu_book</span>
                    </div>
                    <div class="overflow-hidden">
                        <h3 id="detail-title" class="text-3xl font-black tracking-tighter uppercase italic text-text-main leading-none truncate">제목</h3>
                        <p id="detail-meta" class="text-[10px] text-text-secondary uppercase tracking-widest mt-2 opacity-60">카테고리 | 날짜</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-4 p-4 bg-slate-50 rounded-3xl border border-slate-100">
                    <div id="detail-author-avatar" class="size-10 rounded-xl bg-primary text-white flex items-center justify-center font-black text-lg">U</div>
                    <div>
                        <p id="detail-author-name" class="font-black text-text-main text-base">사용자 이름</p>
                        <p class="text-[8px] text-text-secondary uppercase tracking-widest">Post Author</p>
                    </div>
                </div>
            </div>

            <div class="p-8 space-y-10">
                <!-- Main Text Content -->
                <div class="relative">
                    <div class="absolute -left-4 top-0 w-1 h-full bg-primary/20 rounded-full"></div>
                    <p id="detail-content" class="text-xl text-slate-700 leading-relaxed font-medium whitespace-pre-wrap pl-4">내용이 표시됩니다.</p>
                </div>

                <!-- Comments Section -->
                <div class="pt-10 border-t border-slate-100 space-y-8">
                    <h4 class="text-sm font-black text-text-main uppercase tracking-[0.3em] flex items-center gap-3">
                        <span class="material-symbols-outlined text-primary">chat_bubble</span>
                        댓글 리스트 (<span id="detail-comment-count">0</span>)
                    </h4>
                    
                    <div id="detail-comments-list" class="space-y-4"></div>

                    <div class="flex gap-4 items-center bg-slate-50 p-6 rounded-[2rem] border border-slate-200 sticky bottom-0">
                        <input type="text" id="detail-comment-input" placeholder="댓글 남기기..." 
                               class="flex-1 bg-white border border-slate-200 rounded-2xl px-6 py-4 text-lg font-bold text-text-main focus:outline-none focus:border-primary/40 transition-all">
                        <button id="detail-submit-comment" class="size-16 rounded-2xl bg-primary text-white flex items-center justify-center shadow-xl shadow-primary/30">
                            <span class="material-symbols-outlined text-3xl">send</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
