<div id="confirm-modal" class="fixed inset-0 z-[2000] hidden flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-md modal-overlay"></div>
    <div class="relative z-10 modal-v4 w-full max-w-sm p-8 bg-white rounded-3xl shadow-2xl border border-slate-100 flex flex-col items-center text-center gap-6">
        <div class="size-16 rounded-2xl bg-accent/10 flex items-center justify-center text-accent">
            <span class="material-symbols-outlined text-4xl">warning</span>
        </div>
        <div>
            <h3 class="text-xl font-black text-text-main mb-2" id="confirm-title">확인</h3>
            <p class="text-text-secondary text-sm leading-relaxed" id="confirm-message">정말 진행하시겠습니까?</p>
        </div>
        <div class="flex gap-3 w-full mt-2">
            <button id="confirm-cancel-btn" class="flex-1 py-4 rounded-xl bg-slate-100 text-text-main font-black hover:bg-slate-200 transition-all uppercase tracking-widest text-[10px]">Cancel</button>
            <button id="confirm-ok-btn" class="flex-1 py-4 rounded-xl bg-accent text-white font-black hover:bg-accent-dark transition-all uppercase tracking-widest text-[10px] shadow-lg shadow-accent/20">Confirm</button>
        </div>
    </div>
</div>
