<div id="post-detail-modal" class="fixed inset-0 z-[1500] hidden overflow-hidden">
    <div class="absolute inset-0 bg-white/20 transition-opacity duration-500 opacity-0 modal-overlay" id="close-post-detail-overlay"></div>
    <div class="modal-v4 bg-white flex flex-col">
        <!-- Sticky Header -->
        <div class="px-6 pt-8 pb-4 sticky top-0 bg-white/95 backdrop-blur-md z-20 border-b border-slate-100 flex justify-between items-start">
            <div class="flex flex-col flex-1 min-w-0 pr-4">
                <div class="flex items-center gap-2 mb-2">
                    <span id="detail-meta" class="px-2 py-1 bg-primary/10 rounded-lg text-[10px] font-black text-primary uppercase tracking-widest">카테고리 | 날짜</span>
                </div>
                <h3 id="detail-title" class="text-3xl font-black tracking-tighter text-text-main line-clamp-2 leading-tight">제목</h3>
            </div>
            <button id="close-post-detail-modal" class="size-11 rounded-full bg-slate-100 hover:bg-primary hover:text-white transition-all flex items-center justify-center text-slate-500 shrink-0">
                <span class="material-symbols-outlined text-[24px]">close</span>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto w-full custom-scrollbar flex flex-col relative z-10">
            <!-- Content Section -->
            <div class="max-w-2xl mx-auto w-full p-6 sm:p-10">
                <!-- Author Info -->
                <div class="flex items-center gap-3 mb-8">
                    <div id="detail-author-avatar" class="size-12 rounded-2xl bg-primary text-white flex items-center justify-center font-black text-lg">U</div>
                    <div>
                        <p id="detail-author-name" class="font-black text-text-main text-base">사용자 이름</p>
                        <p class="text-[10px] text-text-secondary uppercase tracking-widest font-bold">게시자</p>
                    </div>
                </div>

                <p id="detail-content" class="text-lg text-slate-700 leading-relaxed font-medium whitespace-pre-wrap mb-10 break-words">내용이 표시됩니다.</p>
                
                <div id="detail-image-container" class="hidden mb-10 w-full rounded-3xl overflow-hidden border border-slate-100 bg-slate-50 relative flex items-center justify-center shadow-xl shadow-slate-200/50">
                     <img id="detail-image" src="" class="max-h-[60vh] object-contain w-full h-full">
                </div>
                
                <!-- Comments Section -->
                <div class="pt-10 border-t border-slate-100">
                    <h4 class="text-lg font-black text-text-main flex items-center gap-2 mb-6">
                        <span class="material-symbols-outlined text-primary text-[24px]">chat_bubble</span>
                        댓글 (<span id="detail-comment-count">0</span>)
                    </h4>
                    
                    <div id="detail-comments-list" class="space-y-6 mb-10"></div>
                </div>
            </div>
        </div>
        
        <!-- Comment Input Section (Sticky Bottom) -->
        <div class="p-6 bg-slate-50/80 backdrop-blur-md border-t border-slate-100 z-20 flex gap-4 shrink-0 pb-10 sm:pb-6">
            <div class="max-w-2xl mx-auto w-full flex gap-3">
                <input type="text" id="detail-comment-input" placeholder="따뜻한 댓글을 남겨주세요..." 
                       class="flex-1 bg-white border border-slate-200 rounded-2xl px-6 py-4 text-base font-bold text-text-main focus:outline-none focus:border-primary/40 focus:ring-4 focus:ring-primary/5 transition-all shadow-sm">
                <button id="detail-submit-comment" class="size-14 rounded-2xl bg-primary text-white flex items-center justify-center shadow-xl shadow-primary/30 shrink-0 hover:bg-primary-dark hover:scale-105 active:scale-95 transition-all">
                    <span class="material-symbols-outlined text-[28px]">send</span>
                </button>
            </div>
        </div>
    </div>
</div>
