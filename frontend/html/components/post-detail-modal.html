<div id="post-detail-modal" class="fixed inset-0 z-[1500] hidden flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/80 backdrop-blur-xl modal-overlay" id="close-post-detail-overlay"></div>
    <div class="relative z-10 w-full max-w-2xl max-h-[90vh] bg-white rounded-[2rem] shadow-2xl flex flex-col overflow-hidden">
        <!-- Sticky Header -->
        <div class="px-6 pt-6 pb-4 sticky top-0 bg-white/95 backdrop-blur-md z-20 border-b border-slate-100 flex justify-between items-start">
            <div class="flex flex-col flex-1 min-w-0 pr-4">
                <div class="flex items-center gap-2 mb-2">
                    <span id="detail-meta" class="px-2 py-1 bg-slate-100 rounded-lg text-[10px] font-black text-slate-500 uppercase tracking-widest">카테고리 | 날짜</span>
                </div>
                <h3 id="detail-title" class="text-2xl font-black tracking-tighter text-text-main line-clamp-2">제목</h3>
            </div>
            <button id="close-post-detail-modal" class="size-10 rounded-xl bg-slate-100 hover:bg-slate-200 transition-all flex items-center justify-center text-slate-500 shrink-0">
                <span class="material-symbols-outlined text-[20px]">close</span>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto w-full custom-scrollbar flex flex-col relative z-10">
            <!-- Content Section -->
            <div class="p-6">
                <!-- Author Info -->
                <div class="flex items-center gap-3 mb-6">
                    <div id="detail-author-avatar" class="size-10 rounded-full bg-primary text-white flex items-center justify-center font-black text-sm">U</div>
                    <div>
                        <p id="detail-author-name" class="font-black text-text-main text-sm">사용자 이름</p>
                        <p class="text-[10px] text-text-secondary uppercase tracking-widest">게시자</p>
                    </div>
                </div>

                <p id="detail-content" class="text-base text-slate-700 leading-relaxed font-medium whitespace-pre-wrap mb-6 break-words">내용이 표시됩니다.</p>
                
                <div id="detail-image-container" class="hidden mb-6 w-full rounded-2xl overflow-hidden border border-slate-100 bg-slate-50 relative flex items-center justify-center">
                     <img id="detail-image" src="" class="max-h-[50vh] object-contain w-full h-full">
                </div>
                
                <!-- Comments Section -->
                <div class="pt-6 border-t border-slate-100 mt-auto">
                    <h4 class="text-sm font-black text-text-main flex items-center gap-2 mb-4">
                        <span class="material-symbols-outlined text-primary text-[18px]">chat_bubble</span>
                        댓글 (<span id="detail-comment-count">0</span>)
                    </h4>
                    
                    <div id="detail-comments-list" class="space-y-4 mb-4"></div>
                </div>
            </div>
        </div>
        
        <!-- Comment Input Section (Sticky Bottom) -->
        <div class="p-4 bg-slate-50 border-t border-slate-100 z-20 flex gap-3 shrink-0">
            <input type="text" id="detail-comment-input" placeholder="댓글 남기기..." 
                   class="flex-1 bg-white border border-slate-200 rounded-xl px-4 text-sm font-bold text-text-main focus:outline-none focus:border-primary/40 transition-all">
            <button id="detail-submit-comment" class="size-12 rounded-xl bg-primary text-white flex items-center justify-center shadow-lg shadow-primary/30 shrink-0 hover:bg-primary-dark transition-colors">
                <span class="material-symbols-outlined text-[20px]">send</span>
            </button>
        </div>
    </div>
</div>
