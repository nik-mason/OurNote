<div id="write-modal" class="fixed inset-0 z-[1500] hidden flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-md modal-overlay" id="close-write-modal-overlay"></div>
    <div class="relative z-10 ultra-card modal-v4 full-screen w-full h-full max-w-none p-0 flex flex-col lg:flex-row overflow-hidden bg-white border-0 shadow-none">
        
        <!-- GRID LEFT: Visual/Intro Section -->
        <div class="lg:w-2/5 w-full h-[30vh] lg:h-full bg-slate-900 flex flex-col items-center justify-center p-12 relative overflow-hidden text-white text-center">
            <div class="absolute inset-0 bg-primary/20 backdrop-blur-3xl"></div>
            <!-- Decorative Blobs -->
            <div class="absolute -top-24 -left-24 size-64 bg-primary/30 blur-[100px] rounded-full"></div>
            <div class="absolute -bottom-24 -right-24 size-64 bg-accent/20 blur-[100px] rounded-full"></div>
            
            <div class="relative z-10 space-y-6">
                <div class="size-24 md:size-32 rounded-[2.5rem] bg-white/10 backdrop-blur-md border border-white/20 flex items-center justify-center mx-auto shadow-2xl">
                    <span class="material-symbols-outlined text-5xl md:text-7xl">edit_note</span>
                </div>
                <h2 class="text-4xl md:text-6xl font-black tracking-tighter italic uppercase">새 이야기<br>작성하기</h2>
                <p class="text-slate-300 text-sm md:text-lg font-medium opacity-80">우리만의 소중한 추억을 기록해보세요.</p>
            </div>
            
            <button id="close-write-modal" class="absolute top-6 left-6 size-12 rounded-2xl bg-white/10 backdrop-blur-md hover:bg-white/20 transition-all flex items-center justify-center border border-white/20 z-[100] text-white">
                <span class="material-symbols-outlined text-3xl">arrow_back</span>
            </button>
        </div>

        <!-- GRID RIGHT: Form Section -->
        <div class="lg:w-3/5 w-full h-full flex flex-col bg-white overflow-y-auto custom-scrollbar">
            <div class="p-8 md:p-16 space-y-12">
                <!-- Category Selection -->
                <div class="space-y-6">
                    <label class="text-sm font-black text-primary uppercase tracking-[0.3em] ml-1">게시판 선택</label>
                    <div id="category-chips" class="flex flex-wrap gap-3">
                        <button type="button" class="post-cat-chip active px-6 py-4 rounded-3xl bg-primary text-white font-bold transition-all shadow-xl shadow-primary/20" data-value="dashboard">✨ 대시보드</button>
                        <!-- Injected by JS -->
                    </div>
                    <input type="hidden" id="post-category" value="dashboard">
                </div>

                <!-- Homework Specific -->
                <div id="homework-target-container" class="hidden space-y-6">
                    <label class="text-sm font-black text-primary uppercase tracking-[0.3em] ml-1">수신 학생 선택</label>
                    <div id="student-chips" class="flex flex-wrap gap-2 p-6 bg-slate-50 rounded-3xl border border-slate-100 max-h-48 overflow-y-auto">
                        <button type="button" class="stu-chip active px-4 py-2 rounded-xl bg-primary text-white font-bold text-xs" data-value="all">🌍 전체 공개</button>
                    </div>
                    <input type="hidden" id="homework-target-student-val" value="all">
                </div>

                <!-- Inputs -->
                <div class="space-y-10">
                    <div class="relative group">
                        <label class="text-[10px] font-black text-primary uppercase tracking-[0.2em] ml-1 mb-3 block">이야기 제목</label>
                        <input type="text" id="post-title"
                            class="w-full bg-slate-50 border border-slate-200 rounded-3xl p-8 text-2xl md:text-4xl font-black text-text-main placeholder:text-slate-300 focus:border-primary/40 focus:bg-white outline-none transition-all"
                            placeholder="제목을 입력하세요">
                    </div>

                    <div class="relative group">
                        <label class="text-[10px] font-black text-primary uppercase tracking-[0.2em] ml-1 mb-3 block">본문 내용</label>
                        <textarea id="post-content" rows="10"
                            class="w-full bg-slate-50 border border-slate-200 rounded-3xl p-8 text-xl text-text-main placeholder:text-slate-300 focus:border-primary/40 focus:bg-white outline-none transition-all resize-none"
                            placeholder="우리만의 이야기를 들려주세요..."></textarea>
                    </div>
                </div>

                <!-- Image Upload -->
                <div class="space-y-6">
                    <label class="text-sm font-black text-primary uppercase tracking-[0.3em] ml-1">이미지 추가</label>
                    <div class="relative group">
                        <div class="w-full h-48 bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl flex flex-col items-center justify-center gap-4 hover:border-primary/40 hover:bg-white transition-all cursor-pointer relative overflow-hidden">
                            <span class="material-symbols-outlined text-5xl text-primary/30 group-hover:text-primary transition-colors">add_photo_alternate</span>
                            <span class="text-sm font-bold text-text-secondary">이미지를 선택하거나 드래그하세요</span>
                            <input type="file" id="post-image" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                        </div>
                        <img id="image-preview" src="" class="hidden mt-8 w-full rounded-[2.5rem] border border-slate-100 shadow-2xl">
                    </div>
                </div>

                <!-- Homework Tasks -->
                <div id="homework-tasks-container" class="hidden space-y-6 p-10 bg-primary/5 rounded-[3rem] border border-primary/20">
                    <div class="flex justify-between items-center">
                        <h4 class="text-lg font-black text-primary flex items-center gap-3">
                            <span class="material-symbols-outlined">checklist</span> 필수 항목
                        </h4>
                        <button id="add-task-btn" class="size-12 rounded-2xl bg-primary/20 hover:bg-primary text-primary hover:text-white transition-all">
                            <span class="material-symbols-outlined">add</span>
                        </button>
                    </div>
                    <div id="tasks-input-list" class="space-y-4"></div>
                </div>

                <!-- Action Footer -->
                <div class="pt-8 space-y-8">
                    <div class="flex items-center justify-between p-6 bg-slate-50 rounded-3xl border border-slate-100" id="anonymous-toggle-container">
                        <div class="flex items-center gap-4">
                            <span class="material-symbols-outlined text-text-secondary text-2xl">visibility_off</span>
                            <span class="font-bold text-text-secondary">익명으로 게시</span>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="post-anonymous" class="sr-only peer">
                            <div class="w-14 h-8 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-slate-400 peer-checked:after:bg-white after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-primary shadow-inner"></div>
                        </label>
                    </div>

                    <button id="submit-post"
                        class="w-full py-8 rounded-[2.5rem] bg-primary text-white text-2xl font-black uppercase tracking-[0.3em] shadow-2xl shadow-primary/30 hover:shadow-primary/50 hover:scale-[1.01] active:scale-[0.99] transition-all">
                        지금 바로 게시하기
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
