<!-- PIN Code Modal (Premium v4.3 Full-Screen) -->
<div id="pin-modal" class="fixed inset-0 z-[12000] hidden overflow-hidden">
    <div id="close-pin-overlay" class="absolute inset-0 bg-slate-900/60 backdrop-blur-3xl modal-overlay transition-opacity duration-500 opacity-0"></div>
    
    <div class="modal-v4 full-screen bg-slate-900 flex flex-col items-center justify-center p-8 transition-all duration-500 translate-y-full opacity-0">
        <!-- Close Button -->
        <button id="close-pin-modal" class="absolute top-10 right-10 size-16 rounded-2xl bg-white/5 hover:bg-white/10 text-white flex items-center justify-center transition-all group">
            <span class="material-symbols-outlined text-3xl group-hover:rotate-90 transition-transform">close</span>
        </button>

        <div class="max-w-md w-full space-y-12">
            <!-- Header -->
            <div class="text-center space-y-4">
                <div class="size-24 rounded-[2.5rem] bg-primary/20 flex items-center justify-center text-primary mx-auto mb-8 animate-pulse shadow-2xl shadow-primary/20">
                    <span class="material-symbols-outlined text-6xl font-light">lock_person</span>
                </div>
                <h2 id="pin-target-name" class="text-4xl font-black text-white tracking-tighter italic">비밀번호를 입력하세요</h2>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.4em]">Biometric Signature Required</p>
            </div>

            <!-- PIN Display -->
            <div class="space-y-16 py-10">
                <div id="pin-dots" class="flex justify-center gap-6">
                    <div class="pin-dot size-6 rounded-full border-4 border-slate-700 transition-all duration-300"></div>
                    <div class="pin-dot size-6 rounded-full border-4 border-slate-700 transition-all duration-300"></div>
                    <div class="pin-dot size-6 rounded-full border-4 border-slate-700 transition-all duration-300"></div>
                    <div class="pin-dot size-6 rounded-full border-4 border-slate-700 transition-all duration-300"></div>
                    <div class="pin-dot size-6 rounded-full border-4 border-slate-700 transition-all duration-300"></div>
                    <div class="pin-dot size-6 rounded-full border-4 border-slate-700 transition-all duration-300"></div>
                </div>

                <!-- Hidden Input -->
                <input type="password" id="pin-input-real" class="absolute -top-[5000px] left-0 opacity-0 pointer-events-none" maxlength="6" inputmode="numeric">

                <!-- Keypad -->
                <div class="grid grid-cols-3 gap-4">
                    <button class="keypad-btn h-24 rounded-3xl bg-white/5 border border-white/5 font-black text-4xl text-white hover:bg-white/10 active:scale-90 transition-all" data-val="1">1</button>
                    <button class="keypad-btn h-24 rounded-3xl bg-white/5 border border-white/5 font-black text-4xl text-white hover:bg-white/10 active:scale-90 transition-all" data-val="2">2</button>
                    <button class="keypad-btn h-24 rounded-3xl bg-white/5 border border-white/5 font-black text-4xl text-white hover:bg-white/10 active:scale-90 transition-all" data-val="3">3</button>
                    <button class="keypad-btn h-24 rounded-3xl bg-white/5 border border-white/5 font-black text-4xl text-white hover:bg-white/10 active:scale-90 transition-all" data-val="4">4</button>
                    <button class="keypad-btn h-24 rounded-3xl bg-white/5 border border-white/5 font-black text-4xl text-white hover:bg-white/10 active:scale-90 transition-all" data-val="5">5</button>
                    <button class="keypad-btn h-24 rounded-3xl bg-white/5 border border-white/5 font-black text-4xl text-white hover:bg-white/10 active:scale-90 transition-all" data-val="6">6</button>
                    <button class="keypad-btn h-24 rounded-3xl bg-white/5 border border-white/5 font-black text-4xl text-white hover:bg-white/10 active:scale-90 transition-all" data-val="7">7</button>
                    <button class="keypad-btn h-24 rounded-3xl bg-white/5 border border-white/5 font-black text-4xl text-white hover:bg-white/10 active:scale-90 transition-all" data-val="8">8</button>
                    <button class="keypad-btn h-24 rounded-3xl bg-white/5 border border-white/5 font-black text-4xl text-white hover:bg-white/10 active:scale-90 transition-all" data-val="9">9</button>
                    <button id="pin-clear" class="h-24 rounded-3xl bg-slate-800 text-slate-400 hover:text-red-400 transition-all flex items-center justify-center active:scale-90">
                        <span class="material-symbols-outlined text-4xl">close</span>
                    </button>
                    <button class="keypad-btn h-24 rounded-3xl bg-white/5 border border-white/5 font-black text-4xl text-white hover:bg-white/10 active:scale-90 transition-all" data-val="0">0</button>
                    <button id="pin-delete" class="h-24 rounded-3xl bg-slate-800 text-slate-400 hover:text-primary transition-all flex items-center justify-center active:scale-90">
                        <span class="material-symbols-outlined text-4xl">backspace</span>
                    </button>
                </div>
            </div>

            <!-- Footer Info -->
            <div class="text-center">
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.4em] mb-2">OurNote Encrypted Entry</p>
                <div class="h-1 w-20 bg-primary/30 mx-auto rounded-full"></div>
            </div>
        </div>
    </div>
</div>
