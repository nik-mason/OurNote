<div id="confirm-modal" class="fixed inset-0 z-[2000] hidden flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-md modal-overlay" id="close-confirm-overlay"></div>
    <div class="relative z-10 ultra-card modal-v4 full-screen w-full h-full max-w-none p-0 flex flex-col lg:flex-row overflow-hidden bg-white border-0 shadow-none">
        
        <!-- Decoration Left (Top on Mobile) -->
        <div class="lg:w-2/5 w-full h-[30vh] lg:h-full bg-slate-900 flex flex-col items-center justify-center p-8 relative overflow-hidden text-white">
            <div class="absolute inset-0 bg-accent/20 backdrop-blur-xl"></div>
            <div class="relative z-10 text-center">
                <div class="size-24 md:size-32 rounded-[2.5rem] bg-white/10 border border-white/20 flex items-center justify-center mx-auto mb-6 animate-pulse">
                    <span class="material-symbols-outlined text-6xl md:text-7xl">priority_high</span>
                </div>
                <h4 class="text-xs font-black tracking-[0.5em] opacity-50 uppercase">Security Check</h4>
            </div>
            <button id="close-confirm-modal" class="absolute top-6 left-6 size-12 rounded-2xl bg-white/10 backdrop-blur-md hover:bg-white/20 transition-all flex items-center justify-center border border-white/20 z-[100] text-white">
                <span class="material-symbols-outlined text-3xl">arrow_back</span>
            </button>
        </div>

        <!-- Content Right (Bottom on Mobile) -->
        <div class="lg:w-3/5 w-full h-full p-10 md:p-24 flex flex-col justify-center items-center text-center bg-white">
            <div class="max-w-md mx-auto w-full space-y-12">
                <div class="space-y-6">
                    <h3 class="text-4xl md:text-6xl font-black text-text-main tracking-tighter" id="confirm-title">확인이 필요합니다</h3>
                    <p class="text-text-secondary text-xl md:text-2xl font-medium leading-relaxed" id="confirm-message">이 작업을 계속하시겠습니까?</p>
                </div>
                
                <div class="flex flex-col gap-4 w-full pt-8">
                    <button id="confirm-ok-btn" class="w-full py-8 rounded-[2.5rem] bg-accent text-white font-black hover:bg-accent-dark transition-all uppercase tracking-[0.3em] text-lg shadow-2xl shadow-accent/30">Confirm Action</button>
                    <button id="confirm-cancel-btn" class="text-text-secondary font-black hover:text-text-main transition-colors py-4">Cancel</button>
                </div>
            </div>
        </div>
    </div>
</div>
