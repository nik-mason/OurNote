<div id="settings-modal" class="fixed inset-0 z-[110] hidden overflow-hidden">
    <!-- Blur Overlay -->
    <div id="close-settings-overlay" class="absolute inset-0 bg-slate-900/40 backdrop-blur-2xl transition-opacity duration-500 opacity-0 cursor-pointer"></div>
    
    <!-- Modal Content -->
    <div class="absolute inset-0 flex items-center justify-center p-0 md:p-10 pointer-events-none">
        <div class="modal-settings w-full h-full max-w-6xl bg-white/90 backdrop-blur-xl md:rounded-[3rem] shadow-2xl flex flex-col md:flex-row overflow-hidden pointer-events-auto transition-all duration-700 translate-y-full opacity-0">
            
            <!-- Sidebar: Navigation & Decorations -->
            <div class="w-full md:w-80 bg-slate-50 border-b md:border-b-0 md:border-r border-slate-100 p-8 flex flex-col">
                <div class="mb-10 text-center md:text-left">
                    <h2 class="text-3xl font-black text-text-main tracking-tighter">Settings</h2>
                    <p class="text-sm text-text-secondary font-bold">Manage your profile & UI</p>
                </div>
                
                <nav class="flex-1 space-y-2">
                    <button id="nav-general" class="w-full flex items-center gap-4 p-4 rounded-2xl bg-white shadow-sm text-primary font-black transition-all">
                        <span class="material-symbols-outlined">settings_suggest</span>
                        일반 설정
                    </button>
                    <button id="nav-security" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-slate-100 text-text-secondary font-black transition-all">
                        <span class="material-symbols-outlined">security</span>
                        보안 (PIN 변경)
                    </button>
                    <button id="nav-about" class="w-full flex items-center gap-4 p-4 rounded-2xl hover:bg-slate-100 text-text-secondary font-black transition-all">
                        <span class="material-symbols-outlined">info</span>
                        App 정보
                    </button>
                </nav>

                <div class="mt-auto pt-8 border-t border-slate-200 hidden md:block">
                    <div class="aspect-square rounded-[2rem] bg-gradient-to-br from-primary to-accent p-6 flex flex-col justify-end text-white relative overflow-hidden">
                        <span class="material-symbols-outlined absolute -top-4 -right-4 text-9xl opacity-10">bolt</span>
                        <p class="text-lg font-black leading-tight relative z-10">Premium Experience</p>
                        <p class="text-[10px] font-bold opacity-75 relative z-10 border-t border-white/20 pt-2 mt-2">OURNOTE V4.0</p>
                    </div>
                </div>
            </div>

            <!-- Main Content Area -->
            <div class="flex-1 overflow-y-auto p-8 md:p-16 custom-scrollbar relative">
                <button id="close-settings-modal" class="absolute top-8 right-8 size-12 rounded-full bg-slate-100 hover:bg-primary hover:text-white flex items-center justify-center transition-all z-20">
                    <span class="material-symbols-outlined">close</span>
                </button>

                <!-- SECTION: GENERAL -->
                <div id="section-general" class="space-y-12 animate-fade-in">
                    <div>
                        <h3 class="text-xl font-black text-text-main mb-6">테마 설정</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <button id="theme-light" class="theme-btn relative aspect-[16/10] rounded-[2rem] border-2 border-primary bg-white flex flex-col items-center justify-center gap-3 transition-all">
                                <span class="material-symbols-outlined text-4xl text-primary">light_mode</span>
                                <span class="text-xs font-black">라이트</span>
                                <div class="absolute top-4 right-4 size-5 rounded-full bg-primary flex items-center justify-center">
                                    <span class="material-symbols-outlined text-white text-xs">check</span>
                                </div>
                            </button>
                            <button id="theme-dark" class="theme-btn relative aspect-[16/10] rounded-[2rem] border-2 border-slate-100 bg-slate-900 flex flex-col items-center justify-center gap-3 transition-all hover:border-primary/50">
                                <span class="material-symbols-outlined text-4xl text-slate-400">dark_mode</span>
                                <span class="text-xs font-black text-slate-400">다크</span>
                            </button>
                        </div>
                    </div>

                    <div>
                        <h3 class="text-xl font-black text-text-main mb-6">사용자 인터페이스</h3>
                        <div class="space-y-4">
                            <div class="flex items-center justify-between p-6 rounded-[2rem] bg-slate-50 border border-slate-100">
                                <div class="flex items-center gap-4">
                                    <div class="size-10 rounded-xl bg-primary/10 text-primary flex items-center justify-center">
                                        <span class="material-symbols-outlined">vibration</span>
                                    </div>
                                    <div>
                                        <p class="font-bold text-text-main">Haptic Feedback</p>
                                        <p class="text-[10px] text-text-secondary">터치 시 진동 활성화</p>
                                    </div>
                                </div>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" checked class="sr-only peer">
                                    <div class="w-12 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                                </label>
                            </div>
                            
                            <div class="flex items-center justify-between p-6 rounded-[2rem] bg-slate-50 border border-slate-100">
                                <div class="flex items-center gap-4">
                                    <div class="size-10 rounded-xl bg-accent/10 text-accent flex items-center justify-center">
                                        <span class="material-symbols-outlined">auto_awesome</span>
                                    </div>
                                    <div>
                                        <p class="font-bold text-text-main">Clean Animations</p>
                                        <p class="text-[10px] text-text-secondary">부드러운 화면 전환</p>
                                    </div>
                                </div>
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" checked class="sr-only peer">
                                    <div class="w-12 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- SECTION: SECURITY (PIN) -->
                <div id="section-security" class="hidden space-y-12 animate-fade-in">
                    <div>
                        <h3 class="text-xl font-black text-text-main mb-6">비밀번호 (PIN) 변경</h3>
                        <p class="text-sm text-text-secondary mb-8">안전을 위해 6자리 PIN을 정기적으로 변경해 주세요.</p>
                        
                        <div class="space-y-6 max-w-sm">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-text-secondary uppercase tracking-widest px-2">현재 PIN</label>
                                <input id="pin-current" type="password" maxlength="6" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 focus:border-primary focus:bg-white transition-all text-center tracking-[1rem] font-bold text-2xl" placeholder="••••••">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-text-secondary uppercase tracking-widest px-2">새 PIN</label>
                                <input id="pin-new" type="password" maxlength="6" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 focus:border-primary focus:bg-white transition-all text-center tracking-[1rem] font-bold text-2xl" placeholder="••••••">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-text-secondary uppercase tracking-widest px-2">새 PIN 확인</label>
                                <input id="pin-confirm" type="password" maxlength="6" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 focus:border-primary focus:bg-white transition-all text-center tracking-[1rem] font-bold text-2xl" placeholder="••••••">
                            </div>
                            
                            <button id="save-pin" class="w-full py-5 rounded-[2rem] bg-primary text-white font-black text-lg shadow-xl shadow-primary/20 hover:scale-105 active:scale-95 transition-all">
                                PIN 업데이트 완료
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
